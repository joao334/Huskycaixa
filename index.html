<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login do sistema da Husky Confeitaria" />
  <title>Husky Confeitaria | Login</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body class="login-page-body">
  <div class="app-pattern" aria-hidden="true">
    <img src="assets/img/pattern-husky.svg" alt="" />
  </div>

  <main class="login-page-wrapper">
    <section class="login-page-layout">
      <div class="login-brand-side">
        <div class="login-brand-card">
          <a href="index.html" class="brand-box brand-box-login">
            <img src="assets/img/logo-husky.png" alt="Logo da Husky Confeitaria" class="brand-logo" />
            <div class="brand-text">
              <strong>Husky Confeitaria</strong>
              <span>Sistema de gestão</span>
            </div>
          </a>

          <div class="login-brand-content">
            <span class="eyebrow">Acesso ao sistema</span>
            <h1>Entre ou crie seu acesso</h1>
            <p>
              Controle vendas, estoque, despesas e clientes da Husky em um só lugar.
            </p>
          </div>

          <div class="login-brand-mascot">
            <img src="assets/img/mascote-3d.png" alt="Mascote da Husky" />
          </div>
        </div>
      </div>

      <div class="login-form-side">
        <section class="login-form-card">
          <header class="login-form-header">
            <span class="eyebrow" id="auth-mode-label">Login</span>
            <h2 id="auth-title">Entrar no sistema</h2>
            <p id="auth-subtitle">Use seu e-mail e senha para acessar.</p>
          </header>

          <form id="login-form" class="form form-login" action="#" method="post">
            <div class="form-group">
              <label for="login-email">E-mail</label>
              <input
                type="email"
                id="login-email"
                name="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="login-password">Senha</label>
              <input
                type="password"
                id="login-password"
                name="password"
                placeholder="Digite sua senha"
                autocomplete="current-password"
              />
            </div>

            <div class="form-row two-columns login-inline-actions">
              <label class="checkbox-field">
                <input type="checkbox" id="remember-access" />
                <span>Lembrar acesso</span>
              </label>

              <button type="button" id="btn-forgot-password" class="btn-link">
                Esqueci minha senha
              </button>
            </div>

            <button type="submit" id="btn-login" class="btn btn-primary btn-full">
              Entrar
            </button>

            <button type="button" id="btn-show-register" class="btn btn-secondary btn-full">
              Criar novo login
            </button>
          </form>

          <form id="register-form" class="form form-login is-hidden" action="#" method="post">
            <div class="form-group">
              <label for="register-name">Nome</label>
              <input
                type="text"
                id="register-name"
                name="register-name"
                placeholder="Digite seu nome"
                autocomplete="name"
              />
            </div>

            <div class="form-group">
              <label for="register-email">E-mail</label>
              <input
                type="email"
                id="register-email"
                name="register-email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="register-password">Senha</label>
              <input
                type="password"
                id="register-password"
                name="register-password"
                placeholder="Crie uma senha"
                autocomplete="new-password"
              />
            </div>

            <div class="form-group">
              <label for="register-confirm-password">Confirmar senha</label>
              <input
                type="password"
                id="register-confirm-password"
                name="register-confirm-password"
                placeholder="Repita a senha"
                autocomplete="new-password"
              />
            </div>

            <button type="submit" id="btn-create-account" class="btn btn-primary btn-full">
              Criar login
            </button>

            <button type="button" id="btn-show-login" class="btn btn-secondary btn-full">
              Voltar para login
            </button>
          </form>

          <div class="login-divider">
            <span>Status</span>
          </div>

          <div class="login-status-boxes">
            <div class="status-box">
              <span class="status-title">Acesso</span>
              <strong>Protegido</strong>
            </div>

            <div class="status-box">
              <span class="status-title">Nuvem</span>
              <strong id="login-cloud-status">Pronta</strong>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const btnShowRegister = document.getElementById('btn-show-register');
      const btnShowLogin = document.getElementById('btn-show-login');
      const authModeLabel = document.getElementById('auth-mode-label');
      const authTitle = document.getElementById('auth-title');
      const authSubtitle = document.getElementById('auth-subtitle');

      function showLogin() {
        loginForm.classList.remove('is-hidden');
        registerForm.classList.add('is-hidden');
        authModeLabel.textContent = 'Login';
        authTitle.textContent = 'Entrar no sistema';
        authSubtitle.textContent = 'Use seu e-mail e senha para acessar.';
      }

      function showRegister() {
        loginForm.classList.add('is-hidden');
        registerForm.classList.remove('is-hidden');
        authModeLabel.textContent = 'Cadastro';
        authTitle.textContent = 'Criar novo login';
        authSubtitle.textContent = 'Cadastre seu acesso administrador da Husky.';
      }

      btnShowRegister?.addEventListener('click', showRegister);
      btnShowLogin?.addEventListener('click', showLogin);
    });
  </script>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script src="js/env.js"></script>
<script src="js/supabase-init.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
